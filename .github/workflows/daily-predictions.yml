name: Daily Sports Predictions

on:
  schedule:
    - cron: '0 15 * * *'   # 10:00 AM EST — pre-game predictions
    - cron: '0 5 * * *'    # 12:00 AM EST — post-game grading
  workflow_dispatch:         # manual trigger

jobs:
  # ─── Job 1: NBA game predictions + player props ───────────────────
  predict-nba:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout mattev-sports
        uses: actions/checkout@v4

      - name: Checkout nba-predictor
        uses: actions/checkout@v4
        with:
          repository: mtlusa01/nba-predictor
          token: ${{ secrets.GH_PAT }}
          path: nba-predictor

      - name: Checkout nba-props
        uses: actions/checkout@v4
        with:
          repository: mtlusa01/nba-props
          token: ${{ secrets.GH_PAT }}
          path: nba-props

      - name: Move repos to sibling directories
        run: |
          mv nba-predictor ../nba-predictor
          mv nba-props ../nba-props

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install nba-predictor deps
        run: pip install -r ../nba-predictor/requirements.txt

      - name: Restore nba_data.db from cache
        uses: actions/cache@v4
        with:
          path: ../nba-predictor/nba_data.db
          key: nba-db-${{ github.run_id }}
          restore-keys: nba-db-

      - name: Run NBA daily pipeline
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: ../nba-predictor
        run: python daily_run.py

      - name: Export game_projections.json
        working-directory: ../nba-predictor
        run: python export_game_projections.py --output $GITHUB_WORKSPACE/game_projections.json

      # NOTE: results.json is managed by the local daily_update.py pipeline.
      # CI's export_results.py has an empty accuracy_log and would overwrite
      # real grading data with an empty file. Skipped intentionally.

      - name: Grade yesterday's props
        continue-on-error: true
        working-directory: ../nba-props
        run: python grade_props_ci.py --projections $GITHUB_WORKSPACE/projections.json --results $GITHUB_WORKSPACE/results.json

      - name: Run ESPN props fallback
        continue-on-error: true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: ../nba-props
        run: python espn_props_fallback.py

      - name: Copy NBA outputs to mattev-sports
        run: |
          [ -f ../nba-props/projections.json ] && cp ../nba-props/projections.json . && echo "Copied projections.json" || true
          [ -f game_projections.json ] && echo "game_projections.json already in place" || true
          [ -f results.json ] && echo "results.json already in place" || true

      - name: Save nba_data.db to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ../nba-predictor/nba_data.db
          key: nba-db-${{ github.run_id }}

      - name: Upload mattev-sports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nba-outputs
          path: |
            projections.json
            game_projections.json
            results.json
          if-no-files-found: warn

  # ─── Job 2: NCAAB game predictions ────────────────────────────────
  predict-ncaab:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout mattev-sports
        uses: actions/checkout@v4

      - name: Checkout ncaab-predictor
        uses: actions/checkout@v4
        with:
          repository: mtlusa01/ncaab-predictor
          token: ${{ secrets.GH_PAT }}
          path: ncaab-predictor

      - name: Move repo to sibling directory
        run: mv ncaab-predictor ../ncaab-predictor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ncaab-predictor deps
        run: pip install -r ../ncaab-predictor/requirements.txt

      - name: Restore ncaab_data.db from cache
        uses: actions/cache@v4
        with:
          path: ../ncaab-predictor/ncaab_data.db
          key: ncaab-db-${{ github.run_id }}
          restore-keys: ncaab-db-

      - name: Fetch NCAAB data
        working-directory: ../ncaab-predictor
        run: python get_data.py

      - name: Fetch NCAAB odds
        continue-on-error: true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: ../ncaab-predictor
        run: python fetch_odds.py

      - name: Run NCAAB predictions
        working-directory: ../ncaab-predictor
        run: python predict.py

      - name: Export NCAAB projections
        working-directory: ../ncaab-predictor
        run: python export_projections.py

      - name: Seed results from mattev-sports before grading
        run: |
          # Copy existing results so grading accumulates rather than starting fresh
          [ -f ncaab_results.json ] && cp ncaab_results.json ../ncaab-predictor/ncaab_results.json && echo "Seeded ncaab_results.json" || true

      - name: Grade yesterday's NCAAB games
        continue-on-error: true
        working-directory: ../ncaab-predictor
        run: python grade_ncaab.py --dry

      - name: Copy NCAAB outputs to mattev-sports
        run: |
          [ -f ../ncaab-predictor/ncaab_projections.json ] && cp ../ncaab-predictor/ncaab_projections.json . && echo "Copied ncaab_projections.json" || true
          [ -f ../ncaab-predictor/ncaab_results.json ] && cp ../ncaab-predictor/ncaab_results.json . && echo "Copied ncaab_results.json" || true

      - name: Save ncaab_data.db to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ../ncaab-predictor/ncaab_data.db
          key: ncaab-db-${{ github.run_id }}

      - name: Upload mattev-sports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ncaab-outputs
          path: |
            ncaab_projections.json
            ncaab_results.json
          if-no-files-found: warn

  # ─── Job 3: NHL game predictions ──────────────────────────────────
  predict-nhl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout mattev-sports
        uses: actions/checkout@v4

      - name: Checkout nhl-predictor
        uses: actions/checkout@v4
        with:
          repository: mtlusa01/nhl-predictor
          token: ${{ secrets.GH_PAT }}
          path: nhl-predictor

      - name: Move repo to sibling directory
        run: mv nhl-predictor ../nhl-predictor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install nhl-predictor deps
        run: pip install -r ../nhl-predictor/requirements.txt

      - name: Restore NHL model from cache
        uses: actions/cache@v4
        with:
          path: ../nhl-predictor/nhl_model.pkl
          key: nhl-model-v1
          restore-keys: nhl-model-

      - name: Train NHL model if needed
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: ../nhl-predictor
        run: |
          if [ ! -f nhl_model.pkl ]; then
            echo "No cached model — training from scratch..."
            python nhl_model.py --train
          else
            echo "Model found in cache — skipping training"
          fi

      - name: Run NHL predictions
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: ../nhl-predictor
        run: python nhl_model.py --today --json nhl_game_projections.json

      - name: Grade yesterday's NHL games
        continue-on-error: true
        working-directory: ../nhl-predictor
        run: python grade_nhl.py

      - name: Copy NHL outputs to mattev-sports
        run: |
          [ -f ../nhl-predictor/nhl_game_projections.json ] && cp ../nhl-predictor/nhl_game_projections.json . && echo "Copied nhl_game_projections.json" || true
          [ -f ../nhl-predictor/nhl_results.json ] && cp ../nhl-predictor/nhl_results.json . && echo "Copied nhl_results.json" || true

      - name: Save NHL model to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ../nhl-predictor/nhl_model.pkl
          key: nhl-model-v1

      - name: Upload mattev-sports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhl-outputs
          path: |
            nhl_game_projections.json
            nhl_results.json
          if-no-files-found: warn

  # ─── Job 4: MLB game predictions ──────────────────────────────────
  predict-mlb:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout mattev-sports
        uses: actions/checkout@v4

      - name: Checkout mlb-predictor
        uses: actions/checkout@v4
        with:
          repository: mtlusa01/mlb-predictor
          token: ${{ secrets.GH_PAT }}
          path: mlb-predictor

      - name: Move repo to sibling directory
        run: mv mlb-predictor ../mlb-predictor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mlb-predictor deps
        run: pip install -r ../mlb-predictor/requirements.txt

      - name: Seed results from mattev-sports
        run: |
          [ -f mlb_results.json ] && cp mlb_results.json ../mlb-predictor/mlb_results.json && echo "Seeded mlb_results.json" || true

      - name: Fetch MLB data
        working-directory: ../mlb-predictor
        run: python get_data.py

      - name: Fetch MLB odds
        continue-on-error: true
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        working-directory: ../mlb-predictor
        run: python fetch_odds.py

      - name: Grade yesterday's MLB games
        continue-on-error: true
        working-directory: ../mlb-predictor
        run: python grade_mlb.py

      - name: Run MLB predictions
        working-directory: ../mlb-predictor
        run: python mlb_model.py --today

      - name: Export MLB projections
        working-directory: ../mlb-predictor
        run: python export_projections.py

      - name: Copy MLB outputs to mattev-sports
        run: |
          [ -f ../mlb-predictor/mlb_game_projections.json ] && cp ../mlb-predictor/mlb_game_projections.json . && echo "Copied mlb_game_projections.json" || true
          [ -f ../mlb-predictor/mlb_results.json ] && cp ../mlb-predictor/mlb_results.json . && echo "Copied mlb_results.json" || true

      - name: Upload mattev-sports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb-outputs
          path: |
            mlb_game_projections.json
            mlb_results.json
          if-no-files-found: warn

  # ─── Job 5: Publish to mattev-sports (triggers GitHub Pages) ──────
  publish:
    needs: [predict-nba, predict-ncaab, predict-nhl, predict-mlb]
    if: always() && (needs.predict-nba.result == 'success' || needs.predict-ncaab.result == 'success' || needs.predict-nhl.result == 'success' || needs.predict-mlb.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout mattev-sports
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Download NBA outputs
        if: needs.predict-nba.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: nba-outputs
          path: nba-outputs
        continue-on-error: true

      - name: Download NCAAB outputs
        if: needs.predict-ncaab.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ncaab-outputs
          path: ncaab-outputs
        continue-on-error: true

      - name: Download NHL outputs
        if: needs.predict-nhl.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: nhl-outputs
          path: nhl-outputs
        continue-on-error: true

      - name: Download MLB outputs
        if: needs.predict-mlb.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mlb-outputs
          path: mlb-outputs
        continue-on-error: true

      - name: Archive yesterday's projections before overwrite
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          archive_path = f'archive/projections_{today}.json'

          if os.path.exists(archive_path):
              print(f'{archive_path} already exists — skipping')
              exit(0)

          os.makedirs('archive', exist_ok=True)

          # Bundle current projections (yesterday's games) into archive
          archive = {'date': today, 'archived_at': datetime.now(timezone.utc).isoformat()}
          files = {
              'game_projections': 'game_projections.json',
              'nhl_game_projections': 'nhl_game_projections.json',
              'ncaab_projections': 'ncaab_projections.json',
              'mlb_game_projections': 'mlb_game_projections.json',
              'player_props': None,  # extracted from projections.json
              'all_props': None,
              'results': 'results.json',
          }
          for key, fname in files.items():
              if fname and os.path.exists(fname):
                  try:
                      archive[key] = json.load(open(fname))
                  except Exception:
                      pass

          # Extract props from projections.json
          if os.path.exists('projections.json'):
              try:
                  pdata = json.load(open('projections.json'))
                  archive['player_props'] = pdata.get('projections', [])
                  archive['all_props'] = pdata.get('top_picks', [])
              except Exception:
                  pass

          archive.setdefault('player_props', [])
          archive.setdefault('all_props', [])
          archive['summary'] = {
              'total_props': len(archive.get('player_props', [])),
              'total_all_props': len(archive.get('all_props', [])),
              'total_games': len(archive.get('game_projections', {}).get('games', [])),
              'total_nhl_games': len(archive.get('nhl_game_projections', {}).get('games', [])),
              'total_ncaab_games': len(archive.get('ncaab_projections', {}).get('games', [])),
              'total_mlb_games': len(archive.get('mlb_game_projections', {}).get('games', [])),
          }

          with open(archive_path, 'w') as f:
              json.dump(archive, f, indent=2)
          print(f'Created {archive_path}: {archive[\"summary\"]}')
          "

      - name: Copy JSON files into repo
        run: |
          copied=0
          for f in \
            nba-outputs/projections.json \
            nba-outputs/game_projections.json \
            nba-outputs/results.json \
            ncaab-outputs/ncaab_projections.json \
            ncaab-outputs/ncaab_results.json \
            nhl-outputs/nhl_game_projections.json \
            nhl-outputs/nhl_results.json \
            mlb-outputs/mlb_game_projections.json \
            mlb-outputs/mlb_results.json; do
            if [ -f "$f" ]; then
              cp "$f" .
              echo "Copied $(basename $f)"
              copied=$((copied + 1))
            fi
          done
          echo "Copied $copied file(s)"

      - name: Verify projection files
        run: |
          python3 -c "
          import json, sys
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          errors = []

          checks = [
              ('ncaab_projections.json', 'NCAAB', 2),
              ('nhl_game_projections.json', 'NHL', 1),
              ('mlb_game_projections.json', 'MLB', 0),  # 0 min — may be offseason
          ]

          for fname, sport, min_games in checks:
              try:
                  data = json.load(open(fname))
                  games = data.get('games', [])
                  fdate = data.get('date', '')
                  if fdate != today:
                      errors.append(f'{sport}: date is {fdate}, expected {today}')
                  elif len(games) < min_games:
                      errors.append(f'{sport}: only {len(games)} games (expected >= {min_games})')
                  else:
                      print(f'{sport}: OK — {len(games)} games for {fdate}')
              except FileNotFoundError:
                  print(f'{sport}: {fname} not found — skipping (may not have run)')
              except Exception as e:
                  errors.append(f'{sport}: invalid JSON — {e}')

          if errors:
              print('ERRORS:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print('All projection files valid.')
          "

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          # NOTE: game_projections.json and results.json are managed by the
          # local nba-props daily_update.py pipeline which produces enriched
          # data (injury impacts, edge analysis, EV, recommendations). CI's
          # basic export would overwrite this richer data. Skipped intentionally.
          git add projections.json \
                  ncaab_projections.json ncaab_results.json \
                  nhl_game_projections.json nhl_results.json \
                  mlb_game_projections.json mlb_results.json \
                  archive/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update predictions $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase --autostash origin main || true
            git push
          fi
